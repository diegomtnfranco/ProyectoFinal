version: '3.8'


services:
  db:
    image: postgres:14.3
    restart: always  
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    container_name: parkingdb
    volumes:
      - ./postgres:/var/lib/postgresql/data